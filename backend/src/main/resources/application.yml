spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ledger}
    username: ${DB_USERNAME:ledger}
    password: ${DB_PASSWORD:ledger}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${SERVER_PORT:8080}

app:
  ethereum:
    rpc-url: ${ETHEREUM_RPC_URL:https://eth-mainnet.g.alchemy.com/v2}
  coingecko:
    base-url: ${COINGECKO_BASE_URL:https://api.coingecko.com/api/v3}
    api-key: ${COINGECKO_API_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
